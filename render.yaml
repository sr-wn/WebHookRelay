# Render Blueprint — free-tier live demo of WebhookRelay.
# Deploy: push to GitHub, then in Render → "New" → "Blueprint" and point at this repo.
#
# Provisions: backend (Docker web service), managed Postgres, and a managed Key Value
# (Redis-compatible) instance for the WebSocket fan-out bus.
# The React frontend is deployed separately to Vercel (see .github/workflows/frontend.yml).
#
# NOTE: Render's free managed DB is Postgres, not MySQL. The backend is portable
# (vendor-specific Flyway migrations + Postgres driver), so this "just works". DATABASE_URL
# and REDIS_URL are wired automatically and parsed by ConnectionUrlEnvironmentPostProcessor.

databases:
  - name: webhookrelay-db
    plan: free
    databaseName: webhookrelay
    user: relay

services:
  # Redis-compatible fan-out bus + cache + rate-limit store.
  - type: keyvalue
    name: webhookrelay-redis
    plan: free
    ipAllowList: [] # only reachable from Render services on the private network
    maxmemoryPolicy: noeviction

  - type: web
    name: webhookrelay-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health/readiness
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Render's Postgres connection string (postgres://user:pass@host:port/db). The app's
      # ConnectionUrlEnvironmentPostProcessor converts it to a jdbc URL + username/password.
      - key: DATABASE_URL
        fromDatabase:
          name: webhookrelay-db
          property: connectionString
      # Redis connection string (redis://:pass@host:port); parsed natively by Spring Boot.
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: webhookrelay-redis
          property: connectionString
      - key: WEBHOOKRELAY_CORS_ALLOWED_ORIGINS
        # Set to the frontend's Vercel URL, e.g. https://webhookrelay.vercel.app
        # Never use "*" in production.
        sync: false
      # HS256 signing key (>= 32 bytes). Generate locally with: openssl rand -hex 32
      - key: WEBHOOKRELAY_JWT_SECRET
        generateValue: true
