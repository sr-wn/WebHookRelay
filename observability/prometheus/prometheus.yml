global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: webhookrelay-backend
    metrics_path: /actuator/prometheus
    static_configs:
      # In docker-compose this resolves to the backend service. Scale-out: add each
      # instance / use service discovery so every replica is scraped.
      - targets: ["backend:8080"]
