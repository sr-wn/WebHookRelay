name: frontend

# Path-filtered mirror of backend.yml — only runs when frontend code changes.
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  test:
    name: lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install
        working-directory: frontend
        run: npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  deploy-staging:
    name: deploy preview (staging)
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    # VITE_API_BASE is configured as an env var in the Vercel project and is
    # pulled by `vercel pull`; no build-arg plumbing needed here.
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel env (preview)
        working-directory: frontend
        run: vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Build (preview)
        working-directory: frontend
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Deploy preview
        working-directory: frontend
        run: vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}"

  deploy-prod:
    name: deploy to production
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel env (production)
        working-directory: frontend
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Build (production)
        working-directory: frontend
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Deploy production
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
