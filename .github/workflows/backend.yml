name: backend

# Path-filtered: only runs when backend code changes.
# Mirror this file as frontend.yml with paths: 'frontend/**' and npm steps.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  test:
    name: lint + test (testcontainers)
    runs-on: ubuntu-latest
    # Docker is available on ubuntu-latest, so Testcontainers spins up real MySQL + Redis.
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify (compile + unit + integration tests)
        working-directory: backend
        run: mvn -B verify

  build-and-push:
    name: build + push image
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

  deploy-staging:
    name: deploy to staging
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Trigger Render deploy (staging)
        # Set RENDER_BACKEND_DEPLOY_HOOK_STAGING as a repo/environment secret to a
        # Render deploy-hook URL (Dashboard → your backend service → Deploy Hook).
        run: curl -fsS -X POST "$RENDER_BACKEND_DEPLOY_HOOK_STAGING"
        env:
          RENDER_BACKEND_DEPLOY_HOOK_STAGING: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_STAGING }}

  deploy-prod:
    name: deploy to production
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # 'production' environment gate = manual approval in GitHub repo settings.
    environment: production
    steps:
      - name: Trigger Render deploy (production)
        # Set RENDER_BACKEND_DEPLOY_HOOK_PROD as a repo/environment secret.
        run: curl -fsS -X POST "$RENDER_BACKEND_DEPLOY_HOOK_PROD"
        env:
          RENDER_BACKEND_DEPLOY_HOOK_PROD: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_PROD }}
